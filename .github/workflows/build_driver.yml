name: Build Driver APK

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/driver_app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
      
      - name: Install dependencies
        working-directory: apps/driver_app
        run: flutter pub get
      
      - name: Build APK
        working-directory: apps/driver_app
        run: flutter build apk --debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: driver-app-apk
          path: apps/driver_app/build/app/outputs/flutter-apk/*.apk
