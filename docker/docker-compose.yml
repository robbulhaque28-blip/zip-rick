version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: zip-rick-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zip_rick
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL","pg_isready -U postgres"], interval: 10s, timeout: 5s, retries: 5 }

  redis:
    image: redis:7-alpine
    container_name: zip-rick-redis
    restart: unless-stopped
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    command: redis-server --appendonly yes
    healthcheck: { test: ["CMD","redis-cli","ping"], interval: 10s, timeout: 5s, retries: 5 }

  api:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile
    container_name: zip-rick-api
    restart: unless-stopped
    ports: ["4000:4000"]
    environment:
      NODE_ENV: development
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: zip_rick
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-jwt-secret
      JWT_REFRESH_SECRET: dev-refresh-secret
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ../backend/uploads:/app/uploads
      - ../backend/logs:/app/logs

volumes:
  postgres_data:
  redis_data:
