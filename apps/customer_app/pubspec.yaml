name: zip_rick_customer
description: Zip-Rick Customer App - Book E-Rickshaw rides instantly
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Design
  cupertino_icons: ^1.0.6
  material_design_icons_flutter: ^7.0.7296
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  lottie: ^2.7.0
  page_transition: ^2.1.0

  # State Management
  provider: ^6.1.1
  flutter_riverpod: ^2.4.9

  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  location: ^5.0.3
  flutter_polyline_points: ^2.0.0
  google_maps_webservice: ^0.0.20

  # Networking
  http: ^1.1.2
  dio: ^5.4.0
  socket_io_client: ^2.0.3+1
  connectivity_plus: ^5.0.2

  # Auth
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Payments
  razorpay_flutter: ^1.3.6

  # Notifications
  firebase_messaging: ^14.7.15
  flutter_local_notifications: ^16.3.3

  # Utilities
  intl: ^0.18.1
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  package_info_plus: ^5.0.1
  device_info_plus: ^9.1.1
  permission_handler: ^11.2.0
  image_picker: ^1.0.7
  fluttertoast: ^8.2.4
  dotted_border: ^2.1.0
  flutter_rating_bar: ^4.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mockito: ^5.4.4
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/animations/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
